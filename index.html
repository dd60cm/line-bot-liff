<!DOCTYPE html>

<html>

<head>

  <meta charset="utf-8">

</head>

<body>

<div id="result">初期化中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

async function main() {

  try {

    await liff.init({

      liffId: '2010505293-f0f3W4oz'

    });

    const profile =

    await liff.getProfile();

    const res = await fetch(

    'https://script.google.com/macros/s/AKfycbwMhYWrqbkgAcVH0Q1G5zLSz5Ho58cHSvc2kqN2nvRXpirWNfiYF_M_04R4HVwg_vRq/exec?action=count'

    );

    const data = await res.json();

    document.getElementById('result').innerText =

    `${profile.displayName} さん\n残件数:${data.count}`;

  } catch(err) {

    document.getElementById('result').innerText =

      'エラー: ' + err.message;

  }

}

main();

</script>

</body>

</html>
