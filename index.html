<!DOCTYPE html>

<html>

<head>

  <meta charset="utf-8">

</head>

<body>

<div id="result">初期化中...</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>

async function main() {

  try {

    await liff.init({

      liffId: '2010505293-f0f3W4oz'

    });

    document.getElementById('result').innerText =

      'LIFF初期化成功';

  } catch(err) {

    document.getElementById('result').innerText =

      'エラー: ' + err.message;

  }

}

main();

</script>

</body>

</html>
